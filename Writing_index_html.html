function formatMarkdownToHtml(md) {
    return md
        .replace(/^### (.+)$/gm, '<h3>$1</h3>').replace(/^## (.+)$/gm, '<h2>$1</h2>').replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^\* (.+)$/gm, '<li>$1</li>').replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        .replace(/\n\n/g, '</p><p>').replace(/^(?!<[hul])/gm, '<p>').replace(/(?<![>])$/gm, '</p>')
        .replace(/<p><\/p>/g, '');
}

async function callGeminiAPI(payload, retries = 3) {
    let delay = 2000;
    for (let i = 0; i < retries; i++) {
        try {
            const resp = await fetch(API_URL, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (resp.ok) {
                const data = await resp.json();
                const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
                const groundingChunks = data?.candidates?.[0]?.groundingMetadata?.groundingChunks || [];
                const sources = groundingChunks.map(c => c.web).filter(Boolean);
                if (!text) throw new Error("API 返回了空内容");
                return { text, sources };
            } else if (resp.status === 429 && i < retries - 1) {
                await new Promise(r => setTimeout(r, delay)); delay *= 2;
            } else { throw new Error(`API 请求失败: ${resp.status}`); }
        } catch (err) {
            if (i === retries - 1) throw new Error("无法连接 AI 服务，请稍后再试");
            await new Promise(r => setTimeout(r, delay)); delay *= 2;
        }
    }
}

    if (!country || !query) return;

    document.getElementById('responseText').innerHTML = '';
    document.getElementById('sourcesList').innerHTML = '';
    document.getElementById('sourcesContainer').classList.add('hidden');
    document.getElementById('loadingIndicator').classList.remove('hidden');
    document.getElementById('generateBtn').disabled = true;

    const payload = {
        contents: [{ parts: [{ text: `请为我总结关于 "${country} (${countryCode})" 的旅行信息：${query}` }] }],
        tools: [{ "google_search": {} }],
        systemInstruction: { parts: [{ text: "Act as a passionate travel expert. Provide detailed, easy-to-read travel guide in Chinese with clear headings and bullet points." }] }
    };

    try {
        const { text, sources } = await callGeminiAPI(payload);
        document.getElementById('responseText').innerHTML = formatMarkdownToHtml(text);
        if (sources.length > 0) {
            sources.forEach(s => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="${s.uri}" target="_blank" class="text-indigo-500 hover:text-indigo-700 truncate block">${s.title || s.uri}</a>`;
                document.getElementById('sourcesList').appendChild(li);
            });
            document.getElementById('sourcesContainer').classList.remove('hidden');
        }
    } catch (err) {
        document.getElementById('responseText').innerHTML = `<p class="text-red-500 font-medium">⚠️ ${err.message}</p>`;
    } finally {
        document.getElementById('loadingIndicator').classList.add('hidden');
        updateButtonState();
    }
}
